services:
  postgres:
    image: postgres:16-alpine
    container_name: velozity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: velozity
      POSTGRES_USER: velozity
      POSTGRES_PASSWORD: velozity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: velozity-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://velozity:velozity@postgres:5432/velozity?schema=public
      PORT: 4000
      CLIENT_ORIGIN: http://localhost:5173
      JWT_ACCESS_SECRET: super-secret-access-token-key
      JWT_REFRESH_SECRET: super-secret-refresh-token-key
      ACCESS_TOKEN_TTL_MINUTES: 15
      REFRESH_TOKEN_TTL_DAYS: 7
      COOKIE_DOMAIN: localhost
      NODE_ENV: development
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - /app/node_modules

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: velozity-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:
